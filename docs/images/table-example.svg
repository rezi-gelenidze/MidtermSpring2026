<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Example UNO table state</title>
  <desc id="desc">A table visualization showing three players, the up card, draw pile, discard pile, and direction of play.</desc>
  <rect width="760" height="430" fill="#195c45"/>
  <ellipse cx="380" cy="215" rx="250" ry="145" fill="#25745a" stroke="#d9c27d" stroke-width="6"/>
  <text x="380" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Current Table</text>
  <text x="380" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff">Bot2</text>
  <rect x="318" y="94" width="124" height="34" rx="6" fill="#eee"/>
  <text x="380" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111">4 cards</text>
  <text x="104" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff">You</text>
  <rect x="44" y="230" width="120" height="34" rx="6" fill="#eee"/>
  <text x="104" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111">7 cards</text>
  <text x="656" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff">Bot1</text>
  <rect x="596" y="230" width="120" height="34" rx="6" fill="#eee"/>
  <text x="656" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111">3 cards</text>
  <rect x="306" y="172" width="78" height="112" rx="10" fill="#111" stroke="#fff" stroke-width="3"/>
  <text x="345" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">DRAW</text>
  <rect x="408" y="172" width="78" height="112" rx="10" fill="#c62828" stroke="#fff" stroke-width="3"/>
  <text x="447" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#fff">5</text>
  <text x="447" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">Up card: R5</text>
  <path d="M510 322 C590 260 590 170 510 110" fill="none" stroke="#fff" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fff"/>
    </marker>
  </defs>
  <text x="560" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">turn direction</text>
</svg>
