<svg xmlns="http://www.w3.org/2000/svg" width="840" height="300" viewBox="0 0 840 300" role="img" aria-labelledby="title desc">
  <title id="title">Legal play examples for R5</title>
  <desc id="desc">Shows that on a red 5, red cards, other 5 cards, and wild cards are legal.</desc>
  <rect width="840" height="300" fill="#fafafa"/>
  <text x="420" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">If the up card is R5, these are legal plays</text>
  <rect x="46" y="82" width="80" height="116" rx="10" fill="#c62828" stroke="#222" stroke-width="4"/>
  <text x="86" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#fff">5</text>
  <text x="86" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">up card</text>
  <text x="160" y="150" font-family="Arial, sans-serif" font-size="34" fill="#222">→</text>
  <rect x="220" y="82" width="80" height="116" rx="10" fill="#c62828" stroke="#222" stroke-width="4"/>
  <text x="260" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#fff">9</text>
  <text x="260" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">same color</text>
  <rect x="360" y="82" width="80" height="116" rx="10" fill="#2e7d32" stroke="#222" stroke-width="4"/>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#fff">5</text>
  <text x="400" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">same number</text>
  <rect x="500" y="82" width="80" height="116" rx="10" fill="#c62828" stroke="#222" stroke-width="4"/>
  <text x="540" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#fff">+2</text>
  <text x="540" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">same color</text>
  <rect x="640" y="82" width="80" height="116" rx="10" fill="#222" stroke="#111" stroke-width="4"/>
  <circle cx="680" cy="140" r="28" fill="#fff"/>
  <path d="M680 112 A28 28 0 0 1 708 140 L680 140 Z" fill="#1976d2"/>
  <path d="M708 140 A28 28 0 0 1 680 168 L680 140 Z" fill="#f9a825"/>
  <path d="M680 168 A28 28 0 0 1 652 140 L680 140 Z" fill="#2e7d32"/>
  <path d="M652 140 A28 28 0 0 1 680 112 L680 140 Z" fill="#c62828"/>
  <text x="680" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">wild</text>
</svg>
